project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - benchmarks.qmd
    - "General Cryptography.ipynb"
    - "Encryption Composer.ipynb"
    - Symmetric.ipynb
    - Asymmetric.ipynb
    - ML-KEM.ipynb

website:
  title: "PyCryption Lab"
  description: "An encryption research lab — specimens, composers, and benchmarks."
  favicon: assets/favicon.png
  page-navigation: true
  back-to-top-navigation: true
  navbar:
    logo: assets/logo.png
    left:
      - href: index.qmd
        text: Front Desk
      - href: "General Cryptography.ipynb"
        text: On-Ramp
      - href: "Encryption Composer.ipynb"
        text: Composer Tutorial
      - text: Specimens
        menu:
          - href: Symmetric.ipynb
            text: Symmetric
          - href: Asymmetric.ipynb
            text: Asymmetric
          - href: ML-KEM.ipynb
            text: ML-KEM (Post-Quantum)
      - href: benchmarks.qmd
        text: Benchmarks
    right:
      - icon: github
        href: https://github.com/QR-Madness/pycryption
  page-footer:
    center: "PyCryption — an evolving encryption research lab"

format:
  html:
    # dark listed first = site default; toggle persists per visitor
    theme:
      dark: [darkly, assets/theme-dark.scss]
      light: [flatly, assets/theme-light.scss]
    css: assets/lab.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    highlight-style: a11y
    smooth-scroll: true
    anchor-sections: true
    lightbox: true
    grid:
      body-width: 850px

# Notebooks are rendered from their committed outputs — never executed by
# the site build. (benchmarks.qmd opts back in per-page: it only READS
# persisted benchmark records, it never re-measures.)
execute:
  enabled: false
